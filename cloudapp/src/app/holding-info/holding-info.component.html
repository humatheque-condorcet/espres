<mat-card>
  <mat-card-header>
    <mat-card-title>Informations sur la holding sélectionnée</mat-card-title>
  </mat-card-header>
   <mat-card-content>
     <p><b>Titre :</b> {{ holding.title }}</p>
     <p><b>Auteur :</b> {{ holding.author }}</p>
     <p><b>Code de localisation :</b> {{ holding.location }}</p>
     <p><b>Cote :</b> {{ holding.call_number_value }}</p>
     <p><b>Type de ressource :</b> {{ holding.call_number_type }}</p>
  </mat-card-content>
</mat-card>
